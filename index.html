/* ============================================================
   DESIGN SYSTEM — HIGH-TECH DARK
   Tech Minimal + Sci-Fi HUD + Dark Glass
============================================================ */
:root {
    --void:         #020408;
    --deep:         #060d14;
    --panel:        #0a1628;
    --glass:        rgba(6,18,35,0.85);
    --glass-border: rgba(0,229,255,0.08);
    --cyan:         #00e5ff;
    --cyan-dim:     rgba(0,229,255,0.6);
    --cyan-glow:    rgba(0,229,255,0.12);
    --cyan-pulse:   rgba(0,229,255,0.25);
    --green:        #00ff88;
    --green-dim:    rgba(0,255,136,0.15);
    --amber:        #ffb300;
    --red:          #ff3b5c;
    --text-bright:  #e2f0ff;
    --text-mid:     #7aa3c8;
    --text-dim:     #3d6080;
    --grid:         rgba(0,229,255,0.03);
    --border:       rgba(0,229,255,0.1);
    --border-bright:rgba(0,229,255,0.3);
    --shadow:       0 8px 40px rgba(0,0,0,0.6);
    --shadow-cyan:  0 0 30px rgba(0,229,255,0.08);
    --sidebar-w:    280px;
    --ease:         cubic-bezier(0.25,0.8,0.25,1);
}



*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{max-width:100%;overflow-x:hidden}
html{scroll-behavior:smooth;scroll-padding-top:20px;background:var(--void);transition:background .4s var(--ease)}
body{
    background:var(--void);color:var(--text-bright);
    font-family:'Inter',sans-serif;
    line-height:1.6;text-rendering:optimizeLegibility;
    min-height:100vh;
    user-select:none;-webkit-touch-callout:none;
    transition:background .4s var(--ease),color .4s var(--ease);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
img{pointer-events:none;-webkit-user-drag:none;max-width:100%}

/* ---- DOT GRID BACKGROUND ---- */
body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
        radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
    background-size:40px 40px;
    transition:opacity .4s;
}

/* ---- FONTS ---- */
h1,h2,h3,h4,h5,h6,.brand-name,.section-title,.nav-label{
    font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.15;
}
.mono,.hud-text,.timecode,.nav-num,.scene-code,.stat-num,.gear-spec,.tag-pill{
    font-family:'JetBrains Mono',monospace;
}


/* ---- SCROLL PROGRESS ---- */
.scroll-bar{
    position:fixed;top:0;left:0;width:100%;height:2px;
    background:transparent;z-index:99999;pointer-events:none;
}
.scroll-fill{
    height:100%;width:100%;
    background:linear-gradient(90deg,var(--cyan),var(--green));
    box-shadow:0 0 8px var(--cyan);
    transform-origin:left;
    animation: scroll-progress linear;
    animation-timeline: scroll();
}
@keyframes scroll-progress { from { transform: scaleX(0); } to { transform: scaleX(1); } }


/* ---- PRELOADER ---- */
#preloader{
    position:fixed;inset:0;background:#020408;z-index:9999999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .8s ease,visibility .8s ease;
    overflow:hidden;
}
#preloader::before{
    content:'';position:absolute;inset:0;
    background:
        linear-gradient(transparent 49.5%,rgba(0,229,255,0.03) 49.5%,rgba(0,229,255,0.03) 50.5%,transparent 50.5%);
    background-size:100% 4px;
    animation:scanlines 8s linear infinite;
}
@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(4px)}}

.pre-hud-frame{
    position:relative;width:160px;height:160px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:32px;
}
.pre-ring{
    position:absolute;inset:0;border-radius:50%;
    border:1px solid rgba(0,229,255,0.2);
    animation:ring-spin 3s linear infinite;
}
.pre-ring-inner{
    position:absolute;inset:20px;border-radius:50%;
    border:1px dashed rgba(0,229,255,0.1);
    animation:ring-spin 6s linear infinite reverse;
}
@keyframes ring-spin{to{transform:rotate(360deg)}}

.pre-cross{position:absolute;inset:0;pointer-events:none}
.pre-cross::before,.pre-cross::after{content:'';position:absolute;background:rgba(0,229,255,0.25)}
.pre-cross::before{top:50%;left:20%;right:20%;height:1px;transform:translateY(-50%)}
.pre-cross::after{left:50%;top:20%;bottom:20%;width:1px;transform:translateX(-50%)}

.pre-corner{position:absolute;width:16px;height:16px;border-color:var(--cyan);border-style:solid;border-width:0;opacity:.7}
.pc-tl{top:4px;left:4px;border-top-width:2px;border-left-width:2px}
.pc-tr{top:4px;right:4px;border-top-width:2px;border-right-width:2px}
.pc-bl{bottom:4px;left:4px;border-bottom-width:2px;border-left-width:2px}
.pc-br{bottom:4px;right:4px;border-bottom-width:2px;border-right-width:2px}

.pre-count{
    font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;
    color:var(--cyan);text-shadow:0 0 20px var(--cyan);
}
.pre-brand{
    font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;
    letter-spacing:6px;text-transform:uppercase;color:var(--text-bright);
    margin-bottom:4px;
}
.pre-sub{
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:4px;
    color:var(--text-dim);text-transform:uppercase;margin-bottom:24px;
}
.pre-bar{width:200px;height:1px;background:rgba(0,229,255,0.1);position:relative;overflow:hidden}
.pre-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.pre-label{
    margin-top:10px;font-family:'JetBrains Mono',monospace;
    font-size:.65rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;
}
#preloader.hidden{opacity:0;visibility:hidden;pointer-events:none}

/* ---- CUSTOM CURSOR ---- */
@media(hover:hover)and(pointer:fine){
    body{cursor:none}
    a,button,input,textarea,.partner-item,.video-wrapper{cursor:none!important}
    .cur-dot{
        position:fixed;top:0;left:0;width:8px;height:8px;
        background:var(--cyan);border-radius:50%;
        transform:translate(-50%,-50%);pointer-events:none;z-index:9999999;opacity:0;
        box-shadow:0 0 8px var(--cyan);transition:opacity .2s;
    }
    .cur-ring{
        position:fixed;top:0;left:0;width:32px;height:32px;
        border:1px solid var(--cyan);border-radius:50%;
        transform:translate(-50%,-50%);pointer-events:none;z-index:9999998;opacity:0;
        transition:width .15s,height .15s,opacity .2s,top .06s ease-out,left .06s ease-out;
    }
    body.cur-hover .cur-dot{opacity:0!important}
    body.cur-hover .cur-ring{width:44px;height:44px;background:var(--cyan-glow)}
}
@media(hover:none),(pointer:coarse){.cur-dot,.cur-ring{display:none!important}}



/* ---- HUD TIMECODE ---- */
(function(){
    const tc=document.getElementById('hudTC');if(!tc)return;
    function tick(){
        const n=new Date();
        tc.textContent='TC '+[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':')
            +':'+String(Math.floor(n.getMilliseconds()/41.67)).padStart(2,'0');
        requestAnimationFrame(tick);
    }tick();
})();

/* ---- SECTION FLASH ---- */
(function(){
    const fl=document.getElementById('secFlash');if(!fl)return;
    let last=null;
    const ob=new IntersectionObserver(entries=>{
        entries.forEach(e=>{
            if(e.isIntersecting&&e.target!==last){
                last=e.target;fl.style.transition='none';fl.style.opacity='0.06';
                requestAnimationFrame(()=>requestAnimationFrame(()=>{fl.style.transition='opacity .5s ease';fl.style.opacity='0';}));
            }
        });
    },{threshold:.3});
    document.querySelectorAll('section').forEach(s=>ob.observe(s));
})();
</script>
